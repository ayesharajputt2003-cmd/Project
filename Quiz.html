<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Quiz App</title>

    <style>
body {
    font-family: Arial;
    text-align: center;
    background: #f4f4f4;
}

.question {
    margin: 20px;
}

.option {
    display: block;
    margin: 10px auto;
    padding: 12px;
    width: 60%;
    border: 2px solid #333;
    border-radius: 8px;
    cursor: pointer;
    background-color: white;
    transition: 0.3s;
}

.option:hover {
    background-color: #eee;
}

button {
    padding: 10px 20px;
    margin: 10px;
    cursor: pointer;
}

#Score {
    font-weight: bold;
    font-size: 20px;
}

</style>


    </style>

</head>

<body>

    <h2>Quiz Application</h2>

    <div class="question">
        <span id="Number"></span>
        <h3 id="Question"></h3>
    </div>

    <h3>Score: <span id="Score">0</span></h3>

    <div class="options">
        <button class="option"></button>
        <button class="option"></button>
        <button class="option"></button>
        <button class="option"></button>
    </div>

    <br>

    <button id="Previous">Previous</button>
    <button id="Next">Next</button>

    <div class="container"></div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

    <script>

        const Quiz = [
            {
                question: "What is HTML?",
                option: ["Hyper Text Markup Language", "High Text Machine Language", "Home Tool Markup Language", "None"],
                answer: "Hyper Text Markup Language"
            },
            {
                question: "What is CSS?",
                option: ["Cascading Style Sheets", "Computer Style Sheets", "Creative Style Sheets", "None"],
                answer: "Cascading Style Sheets"
            },
            {
                question: "Which language is used for interactivity?",
                option: ["HTML", "CSS", "JavaScript", "SQL"],
                answer: "JavaScript"
            }
        ];

        let count = 0;
        let score = 0;
        let answered = false;

        function showQuestion() {

            if (count >= Quiz.length) return;

            $("#Number").text(count + 1);
            $("#Question").text(Quiz[count].question);

            $(".option").css("background-color", "white");

            $(".option").eq(0).text(Quiz[count].option[0]);
            $(".option").eq(1).text(Quiz[count].option[1]);
            $(".option").eq(2).text(Quiz[count].option[2]);
            $(".option").eq(3).text(Quiz[count].option[3]);

            answered = false;
        }

        showQuestion();

        // OPTION CLICK (ANSWER CHECK + SCORE)
        $(".option").off("click").on("click", function () {

            if (answered) return;

            let selectText = $(this).text();
            let correctAnswer = Quiz[count].answer;

            $(".option").css("background-color", "white");

            if (selectText === correctAnswer) {

                $(this).css("background-color", "lightgreen");
                score++;
                $("#Score").text(score);

            } else {

                $(this).css("background-color", "red");

                $(".option").each(function () {
                    if ($(this).text() === correctAnswer) {
                        $(this).css("background-color", "lightgreen");
                    }
                });

            }

            answered = true;

        });

        // NEXT BUTTON
        $("#Next").off("click").on("click", function () {

            if (count < Quiz.length - 1) {
                count++;
                showQuestion();
            } else {

                $(".question").hide();
                $(".options").hide();
                $("#Next").hide();
                $("#Previous").hide();
                $("#Score").parent().hide();

                $(".container").html("<h2>🎉 Congratulations! Quiz Completed</h2>");
            }

        });

        // PREVIOUS BUTTON
        $("#Previous").off("click").on("click", function () {

            if (count > 0) {
                count--;
                showQuestion();
            }

        });

    </script>

</body>

</html>
