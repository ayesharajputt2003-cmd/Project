<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Quiz App</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f4f4f4;
        }

        .question {
            margin: 20px;
        }

        #Number {
            margin-block: 10px;
            font-size: 20px;
        }

        .option {
            display: block;
            margin: 10px auto;
            padding: 15px;
            width: 60%;
            border: 2px solid #adacac;
            border-radius: 8px;
            cursor: pointer;
            background-color: #cfcece;
            transition: 0.3s;
        }

        .option:hover {
            background-color: #eee;
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            cursor: pointer;
        }

        #Score {
            font-weight: bold;
            font-size: 20px;
        }
    </style>
</head>

<body>

    <h2>Quiz Application</h2>

    <div class="question">
        <span id="Number"></span>
        <h3 id="Question"></h3>
    </div>

    <h3>Score: <span id="Score"></span></h3>

    <div class="options">
        <button class="option"></button>
        <button class="option"></button>
        <button class="option"></button>
        <button class="option"></button>
    </div>

    <br>

    <button id="Previous" class="btn btn-primary">Previous</button>
    <button id="Next" class="btn btn-primary">Next</button>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

    <script>

        const Quiz = [
            {
                question: "What is HTML?",
                option: [
                    "Hyper Text scripting language",
                    "Hyper Text markup language",
                    "Procedural Programming language",
                    "Hyper text markup language"
                ],
                Answer: "Hyper Text markup language"
            },
            {
                question: "What is CSS?",
                option: [
                    "Cascading style sheet",
                    "Cascading standing sheet",
                    "cascading scripting sheet",
                    "all of above"
                ],
                Answer: "Cascading style sheet"
            },
            {
                question: "What is JavaScript?",
                option: [
                    "Use to add functionality and interactivity",
                    "Used to add styling",
                    "Used to create structure of webpage",
                    "All of these"
                ],
                Answer: "Use to add functionality and interactivity"
            }
        ];

        let number = document.getElementById('Number');
        let Previous = document.getElementById('Previous');
        let Next = document.getElementById('Next');
        let Question = document.getElementById('Question');
        let scoreNumber = document.getElementById('Score');

        let count = 0;
        let score = 0;
        let answered = false;

        // 🔥 Function to show question + options
        function showQuestion() {
            number.innerText = count + 1;
            Question.innerText = Quiz[count].question;

            $('.option').eq(0).text(Quiz[count].option[0]);
            $('.option').eq(1).text(Quiz[count].option[1]);
            $('.option').eq(2).text(Quiz[count].option[2]);
            $('.option').eq(3).text(Quiz[count].option[3]);
        }

        // Initial load
        showQuestion();
        $('#Score').text(score);

        // NEXT button
        Next.addEventListener('click', function () {
            if (count < Quiz.length - 1) {
                count++;
                answered = false;
                showQuestion();
            }
        });

        // PREVIOUS button
        Previous.addEventListener("click", function () {
            if (count > 0) {
                count--;
                answered = false;
                showQuestion();
            }
        });

        // Option click
        $('.option').click(function () {

            if (answered) return;

            answered = true;

            let selectedText = $(this).text();
            let correctText = Quiz[count].Answer;

            if (selectedText === correctText) {
                alert("Correct Answer");
                score++;
                $('#Score').text(score);
            } else {
                alert("Wrong Answer");
            }
        });

        Next.addEventListener('click', function () {

            if (count < Quiz.length - 1) {
                count++;
                answered = false;
                showQuestion();
            }
            else {
                $("#result").text("🎉 Congratulations! You finished the quiz");
                alert("Quiz Completed 🎉");
            }

        });
    </script>

</body>

</html>
