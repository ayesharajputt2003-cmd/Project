<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Generator</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

    <style>
        :root {
            --pure_black: black;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            height: 100vh;
            background-color: rgb(234, 240, 165);
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .Container {
            background-color: rgb(255, 255, 255);
            width: 500px;
            height: 500px;
            box-shadow: 10px 10px 8px rgba(0, 0, 0, 0.6);
            border-radius: 15px;
        }

        h3 {
            text-align: center;
            margin-block: 15px;
        }

        input {
            text-align: center;
            font-size: 20px;
        }

        .input-container {
            margin-block: 4rem;
            display: flex;
            justify-content: center;
        }

        .input-container input {
            width: 90%;
            background-color: #ccc;
            border: none;
            padding: 1.6rem;
            border-radius: 6px;
        }

        .ColorContainer {
            display: flex;

        }

        .color-div input {
            width: 40px;
            border: none;
        }

        button {
            text-align: center;
            margin-block: 2.6rem;
            width: 90%;
        }
    </style>

</head>

<body class="body">

    <div class="Container">
        <div class="row">
            <div class="col">
                <h3> Color Generator </h3>
                <div class="input-container">
                    <input type="text" id="input-box">
                </div>
                <div class="ColorContainer">
                    <div class="color-div text-center mx-3">
                        <button class="btn btn-danger" id="Red">Red</button>
                    </div>
                    <div class="color-div text-center mx-3">
                        <button class="btn btn-info" id="lightblue">lightblue</button>
                    </div>
                    <div class="color-div text-center mx-3">
                        <button class="btn btn-success" id="green">Green</button>
                    </div>
                    <div class="color-div text-center mx-3">
                        <button class="btn btn-primary" id="blue">Blue</button>
                    </div>
                    <div class="color-div text-center mx-4">
                        <button class="btn btn-warning" id="yellow">Yellow</button>
                    </div>
                </div>

                <div class="d-flex justify-content-center">
                    <button class="btn btn-primary" id="GenerateButton">
                        Generate Random Color
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"> </script>


    <script>


        let red = document.getElementById('Red');
        let lightblue = document.getElementById('lightblue');
        let green = document.getElementById('green');
        let blue = document.getElementById('blue');
        let yellow = document.getElementById('yellow');
        let inputbox = document.getElementById('input-box');
        let RGBAButton = document.getElementById('GenerateButton');

        red.addEventListener('click', function () {
             document.body.style.background = "red";
            inputbox.value = red.innerText;
        })

        lightblue.addEventListener('click', function () {
            document.body.style.background = "lightblue";
            inputbox.value = lightblue.innerText;
        })

        green.addEventListener('click', function(){
            document.body.style.background = "green";
            inputbox.value = green.innerText;
        })

         yellow.addEventListener('click', function(){
            document.body.style.background = "yellow";
            inputbox.value = yellow.innerText;
        })

         blue.addEventListener('click', function(){
            document.body.style.background = "blue";
            inputbox.value = blue.innerText;
        })

        RGBAButton.addEventListener('click', function(){
            
            let red = Math.floor(Math.random() * 256);
            let green = Math.floor(Math.random() * 256);
            let blue = Math.floor(Math.random() * 256);
            
            let RGBA = `rgb(${red}, ${green}, ${blue})`;
             document.body.style.background = RGBA;

             inputbox.value = RGBA;

        })


      



       </script>
       </body>

</html>
